{% extends 'base.html' %}

{% block content %}

<h2 style="margin-bottom:25px;">
    Добавление пациента
</h2>

<form method="POST" class="form-block">

    <div class="form-group">

        <input type="text"
               name="full_name"
               placeholder="ФИО"
               required>

    </div>

    <div class="form-group">

        <input type="date"
               name="birth_date"
               required>

    </div>

    <div class="form-group">

        <input type="text"
               name="phone"
               placeholder="Телефон"
               required>

    </div>

    <div class="form-group">

        <textarea name="address"
                  placeholder="Адрес"></textarea>

    </div>

    <button type="submit" class="save-btn">
        Сохранить
    </button>

</form>

{% endblock %}
