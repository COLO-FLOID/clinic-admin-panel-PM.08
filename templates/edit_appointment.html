{% extends 'base.html' %}

{% block content %}

<h2 style="margin-bottom:25px;">Редактирование записи</h2>

<form method="POST" class="form-block">
    <div class="form-group">
        <select name="doctor_id" required>
            {% for doctor in doctors %}
                <option value="{{ doctor[0] }}" {% if doctor[0] == appointment[1] %}selected{% endif %}>
                    {{ doctor[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <select name="patient_id" required>
            {% for patient in patients %}
                <option value="{{ patient[0] }}" {% if patient[0] == appointment[2] %}selected{% endif %}>
                    {{ patient[1] }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <input type="date" name="appointment_date" value="{{ appointment[3] }}" required>
    </div>

    <div class="form-group">
        <input type="time" name="appointment_time" value="{{ appointment[4] }}" required>
    </div>

    <div class="form-group">
        <select name="status" required>
            <option value="Запланирована" {% if appointment[5] == 'Запланирована' %}selected{% endif %}>Запланирована</option>
            <option value="Завершена" {% if appointment[5] == 'Завершена' %}selected{% endif %}>Завершена</option>
            <option value="Отменена" {% if appointment[5] == 'Отменена' %}selected{% endif %}>Отменена</option>
        </select>
    </div>

    <button type="submit" class="save-btn">
        Сохранить изменения
    </button>
</form>

{% endblock %}
