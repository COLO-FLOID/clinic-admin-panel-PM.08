{% extends 'base.html' %}

{% block content %}

<h2 style="margin-bottom:25px;">
    Редактирование врача
</h2>

<form method="POST" class="form-block">

    <div class="form-group">
        <input type="text"
               name="full_name"
               value="{{ doctor[1] }}"
               required>
    </div>

    <div class="form-group">
        <input type="text"
               name="specialization"
               value="{{ doctor[2] }}"
               required>
    </div>

    <div class="form-group">
        <input type="text"
               name="phone"
               value="{{ doctor[3] }}"
               required>
    </div>

    <div class="form-group">
        <input type="email"
               name="email"
               value="{{ doctor[4] }}"
               required>
    </div>

    <button type="submit" class="save-btn">
        Сохранить изменения
    </button>

</form>

{% endblock %}
