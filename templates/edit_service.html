{% extends 'base.html' %}

{% block content %}

<h2 style="margin-bottom:25px;">Редактирование услуги</h2>

<form method="POST" class="form-block">
    <div class="form-group">
        <input type="text" name="title" value="{{ service[1] }}" required>
    </div>

    <div class="form-group">
        <input type="number" name="price" value="{{ service[2] }}" required>
    </div>

    <div class="form-group">
        <textarea name="description">{{ service[3] }}</textarea>
    </div>

    <button type="submit" class="save-btn">
        Сохранить изменения
    </button>
</form>

{% endblock %}
