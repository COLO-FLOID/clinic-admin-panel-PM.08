<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-page">

    <div class="login-box">

        <h2>Медицинская клиника</h2>

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            <div class="input-group">
                <input type="text"
                       name="username"
                       placeholder="Логин">
            </div>

            <div class="input-group">
                <input type="password"
                       name="password"
                       placeholder="Пароль">
            </div>

            <button class="btn" type="submit">
                Войти
            </button>

        </form>

    </div>

</div>

</body>
</html>
