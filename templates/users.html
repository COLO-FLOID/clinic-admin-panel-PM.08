{% extends 'base.html' %}

{% block content %}

<div class="page-header">
    <h2>Пользователи</h2>

    <a href="/add-user" class="add-btn">
        Добавить пользователя
    </a>
</div>

<table>
    <tr>
        <th>ID</th>
        <th>Логин</th>
        <th>Роль</th>
        <th>Статус</th>
        <th>Действия</th>
    </tr>

    {% for user in users %}
    <tr>
        <td>{{ user[0] }}</td>
        <td>{{ user[1] }}</td>
        <td>{{ user[3] }}</td>
        <td>
            {% if user[4] == 'active' %}

                <span class="status completed">
                    Активен
                </span>
            
            {% else %}
            
                <span class="status canceled">
                    Заблокирован
                </span>
            
            {% endif %}
        </td>
        <td>
            <a href="/toggle-user/{{ user[0] }}"
               style="color:#4f46e5; text-decoration:none; font-weight:600;">
                Изменить статус
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
